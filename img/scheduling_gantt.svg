<svg width="680" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>text{font-family:system-ui,"Noto Sans SC",sans-serif}</style>
</defs>

<!--
  Timeline: t=0..6  mapped to x=160..620  (460px / 6s = ~76.7px per second)
  Row 1 (非抢占) cy=110  bar h=40  y=90
  Row 2 (抢占)   cy=200  bar h=40  y=180

  px(t) = 160 + t * 76.667
  t=0→160  t=2→313.3  t=4→466.7  t=6→620
-->

<!-- ── axes & grid ── -->
<!-- vertical gridlines -->
<line x1="160" y1="52" x2="160" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="237" y1="52" x2="237" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="313" y1="52" x2="313" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="390" y1="52" x2="390" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="467" y1="52" x2="467" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="543" y1="52" x2="543" y2="240" stroke="#E2E8F0" stroke-width="1"/>
<line x1="620" y1="52" x2="620" y2="240" stroke="#E2E8F0" stroke-width="1"/>

<!-- tick labels -->
<text x="160" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">0s</text>
<text x="237" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">1s</text>
<text x="313" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">2s</text>
<text x="390" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">3s</text>
<text x="467" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">4s</text>
<text x="543" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">5s</text>
<text x="620" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">6s</text>

<!-- axis line -->
<line x1="160" y1="240" x2="628" y2="240" stroke="#CBD5E1" stroke-width="1"/>

<!-- ── row labels ── -->
<text x="152" y="94"  text-anchor="end" font-size="11" font-weight="700" fill="#475569">非抢占式</text>
<text x="152" y="184" text-anchor="end" font-size="11" font-weight="700" fill="#475569">抢占式</text>

<!-- ════════ ROW 1: 非抢占式 ════════
  P2 runs  t=0..4  x=160..467  w=307
  P1 waits t=2..4  x=313..467  (shown as hatched overlay)
  P1 runs  t=4..6  x=467..620  w=153
-->

<!-- P2 run 0→4 -->
<rect x="160" y="82" width="307" height="40" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
<text x="237" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1E40AF">P2 低优先级</text>
<text x="237" y="112" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#3B82F6">运行中 0s → 4s</text>

<!-- P1 waiting overlay t=2..4 -->
<rect x="313" y="82" width="154" height="40" rx="0" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="4 2" opacity="0.7"/>
<text x="390" y="102" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#DC2626">P1 等待</text>

<!-- P1 run 4→6 -->
<rect x="467" y="82" width="153" height="40" rx="6" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
<text x="543" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#991B1B">P1 高优先级</text>
<text x="543" y="112" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#B91C1C">运行中 4s → 6s</text>

<!-- P1 arrival arrow at t=2 -->
<line x1="313" y1="68" x2="313" y2="80" stroke="#DC2626" stroke-width="1.5"/>
<polygon points="308,68 318,68 313,74" fill="#DC2626"/>
<text x="313" y="62" text-anchor="middle" font-size="9" fill="#DC2626">P1 到达</text>

<!-- ════════ ROW 2: 抢占式 ════════
  P2 run   t=0..2  x=160..313  w=153
  P1 run   t=2..4  x=313..467  w=154
  P2 run   t=4..6  x=467..620  w=153
-->

<!-- P2 first run 0→2 -->
<rect x="160" y="172" width="153" height="40" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
<text x="236" y="187" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1E40AF">P2 低优先级</text>
<text x="236" y="202" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#3B82F6">0s → 2s</text>

<!-- P1 preempts 2→4 -->
<rect x="313" y="172" width="154" height="40" rx="6" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
<text x="390" y="187" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#991B1B">P1 高优先级</text>
<text x="390" y="202" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#B91C1C">抢占 2s → 4s</text>

<!-- P2 resumes 4→6 -->
<rect x="467" y="172" width="153" height="40" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
<text x="543" y="187" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1E40AF">P2 恢复</text>
<text x="543" y="202" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#3B82F6">4s → 6s</text>

<!-- preemption arrow at t=2 -->
<line x1="313" y1="158" x2="313" y2="170" stroke="#DC2626" stroke-width="1.5"/>
<polygon points="308,158 318,158 313,164" fill="#DC2626"/>
<text x="313" y="152" text-anchor="middle" font-size="9" fill="#DC2626">P1 抢占</text>

<!-- ── legend ── -->
<rect x="160" y="256" width="14" height="10" rx="2" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
<text x="179" y="261" dominant-baseline="central" font-size="10" fill="#475569">P2 低优先级</text>
<rect x="290" y="256" width="14" height="10" rx="2" fill="#FEE2E2" stroke="#F87171" stroke-width="1"/>
<text x="309" y="261" dominant-baseline="central" font-size="10" fill="#475569">P1 高优先级</text>
<rect x="420" y="256" width="14" height="10" rx="2" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="3 2"/>
<text x="439" y="261" dominant-baseline="central" font-size="10" fill="#475569">P1 等待 ( 非抢占 ) </text>

</svg>
