<svg width="680" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text { font-family: system-ui, "Noto Sans SC", sans-serif; }</style>
</defs>

<!-- ── 进程容器 ── -->
<rect x="20" y="20" width="640" height="360" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="40" y="44" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="0.06em">进程 PROCESS</text>
<text x="40" y="60" font-size="11" fill="#3B82F6">PCB · 地址空间 · 打开文件 · 信号量</text>

<!-- ── 共享区域 ── -->
<rect x="40" y="76" width="600" height="64" rx="10" fill="#CFFAFE" stroke="#22D3EE" stroke-width="1.5"/>
<text x="340" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490" letter-spacing="0.05em">共享内存区域 SHARED</text>

<!-- 代码段 -->
<rect x="80" y="108" width="190" height="22" rx="6" fill="#A5F3FC" stroke="#0891B2" stroke-width="1"/>
<text x="175" y="119" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#0E7490">代码段  Code segment</text>

<!-- 数据段 -->
<rect x="410" y="108" width="190" height="22" rx="6" fill="#A5F3FC" stroke="#0891B2" stroke-width="1"/>
<text x="505" y="119" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#0E7490">数据段  Data segment</text>

<!-- ── 三条竖线：进程 → 线程 ── -->
<line x1="155" y1="140" x2="155" y2="180" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="4 2"/>
<line x1="340" y1="140" x2="340" y2="180" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="4 2"/>
<line x1="525" y1="140" x2="525" y2="180" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="4 2"/>

<!-- ── 线程 T1 ── -->
<rect x="64" y="180" width="182" height="46" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="155" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0369A1">线程 T1</text>
<text x="155" y="216" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">Thread 1</text>

<!-- T1 → 私有 -->
<line x1="155" y1="226" x2="155" y2="262" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="64" y="262" width="182" height="52" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="155" y="281" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#92400E">私有栈 · TLS</text>
<text x="155" y="298" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">寄存器 · TCB</text>

<!-- ── 线程 T2 ── -->
<rect x="249" y="180" width="182" height="46" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0369A1">线程 T2</text>
<text x="340" y="216" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">Thread 2</text>

<line x1="340" y1="226" x2="340" y2="262" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="249" y="262" width="182" height="52" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="340" y="281" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#92400E">私有栈 · TLS</text>
<text x="340" y="298" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">寄存器 · TCB</text>

<!-- ── 线程 T3 ── -->
<rect x="434" y="180" width="182" height="46" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="525" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0369A1">线程 T3</text>
<text x="525" y="216" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">Thread 3</text>

<line x1="525" y1="226" x2="525" y2="262" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="434" y="262" width="182" height="52" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="525" y="281" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#92400E">私有栈 · TLS</text>
<text x="525" y="298" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">寄存器 · TCB</text>

<!-- ── 图例 ── -->
<rect x="64"  y="338" width="14" height="14" rx="3" fill="#CFFAFE" stroke="#0891B2" stroke-width="1"/>
<text x="84"  y="345" dominant-baseline="central" font-size="11" fill="#0E7490">共享资源</text>
<rect x="180" y="338" width="14" height="14" rx="3" fill="#E0F2FE" stroke="#0284C7" stroke-width="1"/>
<text x="200" y="345" dominant-baseline="central" font-size="11" fill="#0369A1">线程</text>
<rect x="270" y="338" width="14" height="14" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
<text x="290" y="345" dominant-baseline="central" font-size="11" fill="#92400E">线程私有</text>

</svg>
