    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text{font-family:system-ui,"Noto Sans SC",sans-serif}</style>
</defs>

<!-- ══ ROW 0: space labels ══ -->
<text x="120" y="24" text-anchor="middle" font-size="9" font-weight="700" letter-spacing=".08em" fill="#64748B">用户态  USER SPACE</text>
<text x="340" y="24" text-anchor="middle" font-size="9" font-weight="700" letter-spacing=".08em" fill="#D97706">内核态  KERNEL</text>
<text x="560" y="24" text-anchor="middle" font-size="9" font-weight="700" letter-spacing=".08em" fill="#64748B">用户态  USER SPACE</text>

<!-- ══ SPACE BACKGROUND BANDS ══ -->
<rect x="16"  y="32" width="216" height="52" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
<rect x="232" y="32" width="216" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
<rect x="448" y="32" width="216" height="52" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

<!-- ══ PARTICIPANT BOXES ══ -->
<rect x="44"  y="38" width="152" height="40" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="120" y="53" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">进程 P0</text>
<text x="120" y="69" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">Process P0</text>

<rect x="264" y="38" width="152" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
