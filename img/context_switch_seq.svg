<line x1="120" y1="78" x2="120" y2="570" stroke="#0284C7" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>
<line x1="340" y1="78" x2="340" y2="570" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>
<line x1="560" y1="78" x2="560" y2="570" stroke="#16A34A" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>

<!-- ══ ACTIVATION BARS ══ -->
<rect x="114" y="78"  width="12" height="96"  rx="2" fill="#0284C7" opacity=".25"/>
<rect x="334" y="174" width="12" height="246" rx="2" fill="#D97706" opacity=".25"/>
<rect x="554" y="420" width="12" height="150" rx="2" fill="#16A34A" opacity=".25"/>

<!-- ══ INITIAL STATE NOTES ══ -->
<rect x="44"  y="92" width="152" height="26" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
<text x="120" y="105" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1E40AF">正在运行  Running</text>

<rect x="484" y="92" width="152" height="26" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
<text x="560" y="105" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#166534">就绪等待  Ready</text>

<!-- ══ EVENT 1: P0→OS  y=174 ══ -->
<line x1="126" y1="174" x2="332" y2="174" stroke="#DC2626" stroke-width="2" marker-end="url(#arr)"/>
<text x="228" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">中断 / 系统调用 / 异常</text>

<!-- P0 state note -->
<rect x="44" y="184" width="152" height="36" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
<text x="120" y="196" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#DC2626">运行 → 就绪 / 阻塞</text>
<text x="120" y="211" text-anchor="middle" dominant-baseline="central" font-size="9"  fill="#EF4444">Running → Ready/Blocked</text>

<!-- ══ OS STEP NOTES ══ -->
<!-- Step 1 -->
<rect x="358" y="214" width="196" height="38" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
<circle cx="376" cy="233" r="9" fill="#D97706"/>
<text x="376" y="233" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="white">1</text>
<text x="461" y="227" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#92400E">保存 P0 上下文 → PCB₀</text>
<text x="461" y="243" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#B45309">Save P0 context</text>

<!-- Step 2 -->
<rect x="358" y="272" width="196" height="38" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
<circle cx="376" cy="291" r="9" fill="#D97706"/>
<text x="376" y="291" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="white">2</text>
<text x="461" y="285" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#92400E">调度程序选择 P1</text>
<text x="461" y="301" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#B45309">Scheduler picks P1</text>

<!-- Step 3 -->
<rect x="358" y="330" width="196" height="50" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
<circle cx="376" cy="349" r="9" fill="#D97706"/>
<text x="376" y="349" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="white">3</text>
<text x="461" y="341" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#92400E">恢复 P1 上下文 ← PCB₁</text>
<text x="461" y="356" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#B45309">Restore P1 context</text>
<text x="461" y="371" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#94A3B8">隐式: 刷新 TLB / Cache</text>

<!-- ══ EVENT 2: OS→P1 IRET  y=420 ══ -->
<line x1="346" y1="420" x2="552" y2="420" stroke="#16A34A" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text x="448" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">切换回用户态  IRET</text>

<!-- P1 running -->
<rect x="484" y="430" width="152" height="26" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
<text x="560" y="443" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#166534">开始运行  Running</text>

<!-- ══ DISPATCH LATENCY BRACKET ══ -->
<line x1="300" y1="174" x2="300" y2="420" stroke="#7C3AED" stroke-width="1.5"/>
<line x1="294" y1="174" x2="306" y2="174" stroke="#7C3AED" stroke-width="1.5"/>
<line x1="294" y1="420" x2="306" y2="420" stroke="#7C3AED" stroke-width="1.5"/>
<text x="285" y="297" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="#7C3AED" transform="rotate(-90 285 297)">分派延迟  Dispatch Latency</text>

</svg>
