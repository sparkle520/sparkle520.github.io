<text x="340" y="69" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#D97706">Kernel Scheduler</text>

<rect x="484" y="38" width="152" height="40" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="560" y="53" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#166534">进程 P1</text>
<text x="560" y="69" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#16A34A">Process P1</text>

