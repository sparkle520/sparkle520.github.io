<svg width="680" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text { font-family: system-ui, "Noto Sans SC", sans-serif; }</style>
</defs>

<!--
  Layout:
  进程 A   cx=170 cy=80   w=148 h=46
  进程 B   cx=510 cy=80   w=148 h=46
  共享内存  cx=340 cy=240  w=200 h=56
-->

<!-- ── 进程 A ── -->
<rect x="96" y="57" width="148" height="46" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="170" y="80" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0369A1">进程 A</text>
<text x="170" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0284C7">Process A</text>

<!-- ── 进程 B ── -->
<rect x="436" y="57" width="148" height="46" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="510" y="80" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0369A1">进程 B</text>
<text x="510" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0284C7">Process B</text>

<!-- ── 共享内存段 ── -->
<rect x="240" y="212" width="200" height="56" rx="9" fill="#CFFAFE" stroke="#0E7490" stroke-width="2"/>
<text x="340" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#0E7490">共享内存段</text>
<text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0891B2">Shared Memory</text>

<!-- ── 进程 A → 共享内存 (left arrow, label on left) ── -->
<path d="M170 103 L170 185 L240 220" fill="none" stroke="#0284C7" stroke-width="2" marker-end="url(#arr)"/>
<text x="130" y="155" text-anchor="middle" font-size="11" fill="#0284C7">加锁 / 写入</text>

<!-- ── 进程 B → 共享内存 (right arrow, label on right) ── -->
<path d="M510 103 L510 185 L440 220" fill="none" stroke="#0891B2" stroke-width="2" marker-end="url(#arr)"/>
<text x="552" y="155" text-anchor="middle" font-size="11" fill="#0891B2">解锁 / 读取</text>

</svg>
