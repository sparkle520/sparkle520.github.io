<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text { font-family: system-ui, "Noto Sans SC", sans-serif; }</style>
</defs>

<!--
  Three horizontal tiers, centered at x=340
  Node w=220 h=64, cx=340

  CPU    y=40   (top)
  Mem    y=178  (mid)
  Disk   y=316  (bottom)

  Left arrows  (going down): x=260
  Right arrows (going up):   x=420
-->

<!-- ── CPU ── -->
<rect x="230" y="40" width="220" height="64" rx="10" fill="#CFFAFE" stroke="#0E7490" stroke-width="1.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#0E7490">CPU</text>
<text x="340" y="83" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0891B2">运行 · Running</text>

<!-- ── 内存 ── -->
<rect x="230" y="178" width="220" height="64" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="340" y="200" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#0369A1">内存</text>
<text x="340" y="221" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0284C7">就绪队列 · Ready Queue</text>

<!-- ── 外存 ── -->
<rect x="230" y="316" width="220" height="64" rx="10" fill="#EDE9FE" stroke="#6366F1" stroke-width="1.5"/>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#4338CA">外存</text>
<text x="340" y="359" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#6366F1">作业池 · 对换区</text>

<!-- ══ ARROWS ══

  LEFT COLUMN (x=270): downward arrows
    CPU→Mem:   y=104→178   label left
    Mem→Disk:  y=242→316   label left

  RIGHT COLUMN (x=410): upward arrows
    Mem→CPU:   y=178→104   label right
    Disk→Mem:  y=316→242   label right
-->

<!-- CPU → Mem  (left, down) — 时间片/中断 -->
<line x1="270" y1="104" x2="270" y2="176" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="262" y="137" text-anchor="end" font-size="10" font-weight="600" fill="#2563EB">时间片 / 中断</text>
<text x="262" y="151" text-anchor="end" font-size="10" fill="#3B82F6">Timeout / Interrupt</text>

<!-- Mem → CPU  (right, up) — 低级调度 -->
<line x1="410" y1="176" x2="410" y2="106" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arr)"/>
<text x="418" y="130" text-anchor="start" font-size="10" font-weight="600" fill="#16A34A">低级调度</text>
<text x="418" y="144" text-anchor="start" font-size="10" fill="#22C55E">就绪 → 运行</text>

<!-- Mem → Disk  (left, down) — 中级调度·挂起 -->
<line x1="270" y1="242" x2="270" y2="314" fill="none" stroke="#9333EA" stroke-width="2" marker-end="url(#arr)"/>
<text x="262" y="272" text-anchor="end" font-size="10" font-weight="600" fill="#9333EA">中级调度</text>
<text x="262" y="286" text-anchor="end" font-size="10" fill="#A855F7">挂起 · Suspend</text>

<!-- Disk → Mem  (right, up) — 高级 + 中级·激活 -->
<line x1="410" y1="314" x2="410" y2="244" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
<text x="418" y="264" text-anchor="start" font-size="10" font-weight="600" fill="#D97706">高级 / 中级调度</text>
<text x="418" y="278" text-anchor="start" font-size="10" fill="#F59E0B">作业→进程 · 激活</text>

<!-- ── tier labels (far left) ── -->
<text x="22" y="75"  font-size="10" font-weight="700" fill="#0E7490" letter-spacing=".06em">L3</text>
<text x="22" y="88"  font-size="9"  fill="#94A3B8">低级</text>
<text x="22" y="213" font-size="10" font-weight="700" fill="#0369A1" letter-spacing=".06em">L2</text>
<text x="22" y="226" font-size="9"  fill="#94A3B8">中级</text>
<text x="22" y="351" font-size="10" font-weight="700" fill="#4338CA" letter-spacing=".06em">L1</text>
<text x="22" y="364" font-size="9"  fill="#94A3B8">高级</text>

<!-- tier dividers -->
<line x1="44" y1="150" x2="636" y2="150" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="44" y1="288" x2="636" y2="288" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>

<!-- ── legend ── -->
<line x1="230" y1="408" x2="258" y2="408" stroke="#16A34A" stroke-width="2" marker-end="url(#arr)"/>
<text x="264" y="408" dominant-baseline="central" font-size="10" fill="#64748B">低级调度（分派）</text>
<line x1="370" y1="408" x2="398" y2="408" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
<text x="404" y="408" dominant-baseline="central" font-size="10" fill="#64748B">高 / 中级调度</text>

</svg>
