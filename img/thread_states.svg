<svg width="680" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text { font-family: system-ui, "Noto Sans SC", sans-serif; }</style>
</defs>

<!--
  Nodes (w=160 h=64):
  Ready   cx=120  x=40   y=108
  Running cx=340  x=260  y=108
  Blocked cx=560  x=480  y=108
-->

<!-- ── Ready ── -->
<rect x="40" y="108" width="160" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
<text x="120" y="132" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1E40AF">就绪</text>
<text x="120" y="153" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B82F6">Ready · 等待调度</text>

<!-- ── Running ── -->
<rect x="260" y="108" width="160" height="64" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
<text x="340" y="132" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#166534">运行</text>
<text x="340" y="153" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#22C55E">Running · 占用 CPU</text>

<!-- ── Blocked ── -->
<rect x="480" y="108" width="160" height="64" rx="10" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
<text x="560" y="132" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#92400E">阻塞</text>
<text x="560" y="153" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#F59E0B">Blocked · 等待事件</text>

<!-- ── Ready → Running (upper, y=128) ── -->
<line x1="200" y1="128" x2="260" y2="128" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arr)"/>
<text x="230" y="121" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">分派 Dispatch</text>

<!-- ── Running → Ready (lower, y=152) ── -->
<line x1="260" y1="152" x2="200" y2="152" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="230" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">时间片 / 抢占</text>

<!-- ── Running → Blocked (upper, y=128) ── -->
<line x1="420" y1="128" x2="480" y2="128" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
<text x="450" y="121" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">I/O · 等待锁</text>

<!-- ── Blocked → Ready (arc below, via y=220) ── -->
<path d="M560 172 L560 220 L120 220 L120 172" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="340" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">事件完成 · 唤醒</text>

</svg>
