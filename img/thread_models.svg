<svg width="680" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text { font-family: system-ui, "Noto Sans SC", sans-serif; }</style>
</defs>

<!--
  Three panels, each w=196, gap=26
  Panel 1 x=20   (N:1)
  Panel 2 x=242  (1:1)
  Panel 3 x=464  (M:N)

  Row positions:
  Title     y=20
  Proc      cy=62   h=38  y=43
  ULT row   cy=148  h=34  y=131
  KLT row   cy=258  h=34  y=241
  Note      y=310
-->

<!-- ══════════════════════════════
     PANEL 1 — N:1
     ══════════════════════════════ -->
<rect x="20" y="20" width="196" height="320" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>

<text x="118" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" letter-spacing=".06em">N : 1</text>
<text x="118" y="60" text-anchor="middle" font-size="10" fill="#94A3B8">多对一</text>

<!-- Proc -->
<rect x="54" y="76" width="128" height="36" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
<text x="118" y="94" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#7B1FA2">进程</text>

<!-- proc → ULT lines -->
<line x1="78"  y1="112" x2="64"  y2="138" stroke="#CBD5E1" stroke-width="1.5"/>
<line x1="118" y1="112" x2="118" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>
<line x1="158" y1="112" x2="172" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>

<!-- ULT 1 2 3 -->
<rect x="32"  y="138" width="64" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="64"  y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #1</text>

<rect x="86"  y="138" width="64" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="118" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #2</text>

<rect x="140" y="138" width="64" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="172" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #3</text>

<!-- ULT → KLT (all converge) -->
<line x1="64"  y1="172" x2="118" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="118" y1="172" x2="118" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="172" y1="172" x2="118" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- KLT 1 -->
<rect x="54" y="228" width="128" height="34" rx="7" fill="#E0F2F1" stroke="#009688" stroke-width="1.5"/>
<text x="118" y="245" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#00695C">KLT #1</text>

<!-- note -->
<text x="118" y="286" text-anchor="middle" font-size="10" fill="#94A3B8">仅一个内核线程</text>
<text x="118" y="300" text-anchor="middle" font-size="10" fill="#94A3B8">无法并行执行</text>
<text x="118" y="320" text-anchor="middle" font-size="10" fill="#EF4444">✗ 阻塞影响全部 ULT</text>


<!-- ══════════════════════════════
     PANEL 2 — 1:1
     ══════════════════════════════ -->
<rect x="242" y="20" width="196" height="320" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>

<text x="340" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" letter-spacing=".06em">1 : 1</text>
<text x="340" y="60" text-anchor="middle" font-size="10" fill="#94A3B8">一对一</text>

<!-- Proc -->
<rect x="276" y="76" width="128" height="36" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
<text x="340" y="94" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#7B1FA2">进程</text>

<!-- proc → ULT lines -->
<line x1="308" y1="112" x2="295" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>
<line x1="372" y1="112" x2="385" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>

<!-- ULT 1 2 -->
<rect x="259" y="138" width="72" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="295" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #1</text>

<rect x="349" y="138" width="72" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="385" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #2</text>

<!-- ULT → KLT 1:1 -->
<line x1="295" y1="172" x2="295" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="385" y1="172" x2="385" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- KLT 1 2 -->
<rect x="259" y="228" width="72" height="34" rx="7" fill="#E0F2F1" stroke="#009688" stroke-width="1.5"/>
<text x="295" y="245" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#00695C">KLT #1</text>

<rect x="349" y="228" width="72" height="34" rx="7" fill="#E0F2F1" stroke="#009688" stroke-width="1.5"/>
<text x="385" y="245" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#00695C">KLT #2</text>

<!-- note -->
<text x="340" y="286" text-anchor="middle" font-size="10" fill="#94A3B8">每个 ULT 对应一个 KLT</text>
<text x="340" y="300" text-anchor="middle" font-size="10" fill="#94A3B8">真正并行</text>
<text x="340" y="320" text-anchor="middle" font-size="10" fill="#16A34A">✓ 阻塞不影响其他线程</text>


<!-- ══════════════════════════════
     PANEL 3 — M:N
     ══════════════════════════════ -->
<rect x="464" y="20" width="196" height="320" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>

<text x="562" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" letter-spacing=".06em">M : N</text>
<text x="562" y="60" text-anchor="middle" font-size="10" fill="#94A3B8">多对多</text>

<!-- Proc -->
<rect x="498" y="76" width="128" height="36" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
<text x="562" y="94" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#7B1FA2">进程</text>

<!-- proc → ULT lines -->
<line x1="522" y1="112" x2="508" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>
<line x1="562" y1="112" x2="562" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>
<line x1="602" y1="112" x2="616" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>

<!-- ULT 1 2 3 -->
<rect x="474" y="138" width="60" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="504" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #1</text>

<rect x="532" y="138" width="60" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="562" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #2</text>

<rect x="590" y="138" width="60" height="34" rx="7" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
<text x="620" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1565C0">ULT #3</text>

<!-- ULT → KLT M:N mapping: 1→K1, 2→K2, 3→K1 -->
<line x1="504" y1="172" x2="519" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="562" y1="172" x2="605" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="620" y1="172" x2="519" y2="228" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- KLT 1 2 -->
<rect x="481" y="228" width="76" height="34" rx="7" fill="#E0F2F1" stroke="#009688" stroke-width="1.5"/>
<text x="519" y="245" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#00695C">KLT #1</text>

<rect x="567" y="228" width="76" height="34" rx="7" fill="#E0F2F1" stroke="#009688" stroke-width="1.5"/>
<text x="605" y="245" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#00695C">KLT #2</text>

<!-- note -->
<text x="562" y="286" text-anchor="middle" font-size="10" fill="#94A3B8">M 个 ULT 映射到 N 个 KLT</text>
<text x="562" y="300" text-anchor="middle" font-size="10" fill="#94A3B8">灵活调度，兼顾性能</text>
<text x="562" y="320" text-anchor="middle" font-size="10" fill="#16A34A">✓ 并行 + 开销可控</text>

<!-- ── Row labels (left of diagram) ── -->
<text x="14" y="155" text-anchor="end" font-size="9" font-weight="700" fill="#94A3B8" transform="rotate(-90 14 155)">用户线程</text>
<text x="14" y="245" text-anchor="end" font-size="9" font-weight="700" fill="#94A3B8" transform="rotate(-90 14 245)">内核线程</text>

</svg>
