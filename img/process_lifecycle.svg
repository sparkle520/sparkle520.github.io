<!--
  Timeline: t=0..14  mapped to x=130..630  (500px / 14s ≈ 35.7px/s)
  px(t) = 130 + t * 35.714

  t=0  → 130    arrival
  t=3  → 237    first run / response
  t=5  → 309    end first run → blocked
  t=9  → 452    end blocked → waiting again
  t=11 → 523    end waiting → run again
  t=14 → 630    completion

  Row 1 (进程 P1)  y=76   bar h=36
  Row 2 (指标)     y=168  bar h=26  (4 metrics stacked)
-->

