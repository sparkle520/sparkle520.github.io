<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, "Noto Sans SC", sans-serif; }
  </style>
</defs>

<!-- ── NEW ── -->
<rect x="266" y="30" width="148" height="46" rx="9" fill="#E0F7EE" stroke="#059669" stroke-width="1.5"/>
<text x="340" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#065F46">创建 New</text>

<!-- ── READY ── -->
<rect x="72" y="170" width="148" height="46" rx="9" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="146" y="193" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#1E3A8A">就绪 Ready</text>

<!-- ── RUNNING ── -->
<rect x="266" y="170" width="148" height="46" rx="9" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="340" y="193" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#14532D">运行 Running</text>

<!-- ── BLOCKED ── -->
<rect x="460" y="170" width="148" height="46" rx="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="534" y="193" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#78350F">阻塞 Blocked</text>

<!-- ── SUSP-READY ── -->
<rect x="72" y="400" width="148" height="52" rx="9" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
<text x="146" y="418" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#334155">挂起就绪</text>
<text x="146" y="438" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#64748B">Suspended Ready</text>

<!-- ── SUSP-BLOCKED ── -->
<rect x="460" y="400" width="148" height="52" rx="9" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
<text x="534" y="418" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#334155">挂起阻塞</text>
<text x="534" y="438" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#64748B">Suspended Blocked</text>

<!-- ── TERMINATED ── -->
<rect x="266" y="530" width="148" height="46" rx="9" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
<text x="340" y="553" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#7F1D1D">终止 Terminated</text>

<!-- ══ ARROWS ══ -->

<!-- 1: New → Ready -->
<path d="M340 76 L340 126 L146 126 L146 170" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arr)"/>
<text x="232" y="119" text-anchor="middle" font-size="11" fill="#059669">进入就绪</text>

<!-- 2: Ready → Running -->
<line x1="220" y1="184" x2="266" y2="184" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arr)"/>
<text x="243" y="177" text-anchor="middle" font-size="11" fill="#16A34A">调度</text>

<!-- 3: Running → Ready -->
<line x1="266" y1="202" x2="220" y2="202" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="243" y="217" text-anchor="middle" font-size="11" fill="#2563EB">时间片/抢占</text>

<!-- 4: Running → Blocked -->
<line x1="414" y1="184" x2="460" y2="184" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
<text x="437" y="177" text-anchor="middle" font-size="11" fill="#D97706">I/O 等待</text>

<!-- 5: Blocked → Ready -->
<path d="M534 216 L534 254 L146 254 L146 216" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="340" y="268" text-anchor="middle" font-size="11" fill="#2563EB">事件完成</text>

<!-- 6: Ready → SuspReady (dashed) -->
<line x1="100" y1="216" x2="100" y2="400" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr)"/>
<text x="84" y="310" text-anchor="end" font-size="11" fill="#64748B">挂起</text>

<!-- 7: SuspReady → Ready -->
<line x1="192" y1="400" x2="192" y2="216" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="198" y="310" text-anchor="start" font-size="11" fill="#2563EB">激活</text>

<!-- 8: Blocked → SuspBlocked (dashed) -->
<line x1="570" y1="216" x2="570" y2="400" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr)"/>
<text x="576" y="310" text-anchor="start" font-size="11" fill="#64748B">挂起</text>

<!-- 9: SuspBlocked → Ready -->
<path d="M460 445 L44 445 L44 193 L72 193" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
<text x="38" y="328" text-anchor="end" font-size="11" fill="#2563EB">激活</text>
<text x="252" y="459" text-anchor="middle" font-size="11" fill="#2563EB">事件完成</text>

<!-- 10: Running → Terminated -->
<line x1="372" y1="216" x2="372" y2="530" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#arr)"/>
<text x="378" y="385" text-anchor="start" font-size="11" fill="#DC2626">结束</text>

<!-- ── legend ── -->
<line x1="80" y1="598" x2="110" y2="598" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<text x="116" y="598" dominant-baseline="central" font-size="11" fill="#475569">正常转换</text>
<line x1="210" y1="598" x2="240" y2="598" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr)"/>
<text x="246" y="598" dominant-baseline="central" font-size="11" fill="#64748B">挂起操作</text>

</svg>
