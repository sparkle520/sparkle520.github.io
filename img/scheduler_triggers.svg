<svg width="680" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="cross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 9M2 9L8 1" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round"/>
  </marker>
  <style>text{font-family:system-ui,"Noto Sans SC",sans-serif}</style>
</defs>

<!--
  Layout:
  Col L  cx=100  必须调度 (red)
  Col M  cx=340  可以调度 (amber)
  Col R  cx=580  不能调度 (gray)

  3 nodes per col, y = 40 / 130 / 220
  node w=152 h=48

  Scheduler  cx=340  y=310  w=160 h=52
  Switch     cx=340  y=400  w=160 h=44
-->

<!-- ══ GROUP LABELS ══ -->
<!-- 必须调度 -->
<rect x="16" y="16" width="168" height="274" rx="12" fill="#FFF5F5" stroke="#FCA5A5" stroke-width="1"/>
<text x="100" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C" letter-spacing=".07em">必须调度</text>

<!-- 可以调度 -->
<rect x="256" y="16" width="168" height="274" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
<text x="340" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#D97706" letter-spacing=".07em">可以调度</text>

<!-- 不能调度 -->
<rect x="496" y="16" width="168" height="274" rx="12" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
<text x="580" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing=".07em">不能调度</text>

<!-- ══ 必须调度 nodes ══ -->
<rect x="24" y="46" width="152" height="50" rx="9" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
<text x="100" y="65" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#991B1B">进程终止</text>
<text x="100" y="83" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B91C1C">Exit</text>

<rect x="24" y="114" width="152" height="50" rx="9" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
<text x="100" y="133" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#991B1B">I/O 阻塞 / 等待</text>
<text x="100" y="151" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B91C1C">Wait / Block</text>

<rect x="24" y="182" width="152" height="50" rx="9" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
<text x="100" y="201" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#991B1B">异常终止</text>
<text x="100" y="219" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B91C1C">Exception</text>

<!-- ══ 可以调度 nodes ══ -->
<rect x="264" y="46" width="152" height="50" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="340" y="65" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#92400E">时间片用完</text>
<text x="340" y="83" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">Time Slice</text>

<rect x="264" y="114" width="152" height="50" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="340" y="133" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#92400E">唤醒高优进程</text>
<text x="340" y="151" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">Wakeup</text>

<rect x="264" y="182" width="152" height="50" rx="9" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="340" y="201" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#92400E">系统调用返回</text>
<text x="340" y="219" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#B45309">Syscall Return</text>

<!-- ══ 不能调度 nodes ══ -->
<rect x="504" y="46" width="152" height="50" rx="9" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
<text x="580" y="65" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1F2937">中断处理中</text>
<text x="580" y="83" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#4B5563">ISR</text>

<rect x="504" y="114" width="152" height="50" rx="9" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
<text x="580" y="133" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1F2937">持有自旋锁</text>
<text x="580" y="151" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#4B5563">Spinlock</text>

<rect x="504" y="182" width="152" height="50" rx="9" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
<text x="580" y="201" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#1F2937">内核临界区</text>
<text x="580" y="219" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#4B5563">Kernel Critical</text>

<!-- ══ SCHEDULER ══ -->
<rect x="260" y="308" width="160" height="54" rx="10" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1.5"/>
<text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#FFFFFF">调度器</text>
<text x="340" y="349" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#BFDBFE">Scheduler</text>

<!-- ══ CONTEXT SWITCH ══ -->
<rect x="260" y="396" width="160" height="48" rx="10" fill="#D1FAE5" stroke="#34D399" stroke-width="1.5"/>
<text x="340" y="415" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#065F46">进程切换</text>
<text x="340" y="433" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#059669">Context Switch</text>

<!-- ══ ARROWS: triggers → scheduler ══ -->
<!-- 必须调度: L-bend right then down to scheduler -->
<path d="M100 232 L100 282 L258 335" fill="none" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arr)"/>
<!-- 可以调度: straight down -->
<line x1="340" y1="232" x2="340" y2="306" stroke="#D97706" stroke-width="1.8" marker-end="url(#arr)"/>
<!-- 不能调度: dashed with cross, L-bend -->
<path d="M580 232 L580 282 L422 335" fill="none" stroke="#9CA3AF" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#cross)"/>

<!-- trigger labels -->
<text x="148" y="270" text-anchor="start" font-size="10" fill="#EF4444">触发</text>
<text x="346" y="272" text-anchor="start" font-size="10" fill="#D97706">触发</text>
<text x="540" y="270" text-anchor="middle" font-size="10" fill="#9CA3AF">禁止</text>

<!-- scheduler → context switch -->
<line x1="340" y1="362" x2="340" y2="394" stroke="#1D4ED8" stroke-width="2" marker-end="url(#arr)"/>
<text x="348" y="381" text-anchor="start" font-size="10" fill="#1D4ED8">决定切换</text>

</svg>
