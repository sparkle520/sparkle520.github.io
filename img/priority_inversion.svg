<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text{font-family:system-ui,"Noto Sans SC",sans-serif}</style>
</defs>

<!-- ══ LEFT PANEL ══ -->
<rect x="16" y="16" width="308" height="448" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="6 3"/>
<text x="170" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B" letter-spacing=".04em">优先级反转  Priority Inversion</text>

<rect x="60" y="58" width="220" height="48" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="170" y="76" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">线程 H  高优先级</text>
<text x="170" y="94" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">请求锁 R → 被阻塞</text>

<line x1="170" y1="106" x2="170" y2="154" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text x="178" y="132" text-anchor="start" font-size="10" fill="#DC2626">阻塞等待</text>

<rect x="60" y="158" width="220" height="48" rx="9" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="170" y="176" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#334155">锁 R</text>
<text x="170" y="194" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#64748B">由线程 L ( 低优先级 ) 持有</text>

<line x1="170" y1="206" x2="170" y2="254" stroke="#D97706" stroke-width="1.8" marker-end="url(#arr)"/>
<text x="178" y="232" text-anchor="start" font-size="10" fill="#D97706">M 抢占 L</text>

<rect x="60" y="258" width="220" height="48" rx="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="170" y="276" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#B45309">线程 M  中优先级</text>
<text x="170" y="294" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#D97706">抢占 L，持续运行</text>

<line x1="170" y1="306" x2="170" y2="330" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arr)"/>

<rect x="40" y="332" width="260" height="48" rx="9" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
<text x="170" y="350" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#DC2626">H 持续被阻塞</text>
<text x="170" y="368" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#EF4444">优先级反转，H 迟迟无法运行</text>

<!-- ══ RIGHT PANEL ══ -->
<rect x="356" y="16" width="308" height="448" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1" stroke-dasharray="6 3"/>
<text x="510" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A" letter-spacing=".04em">优先级继承  Priority Inheritance</text>

<rect x="400" y="58" width="220" height="48" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="510" y="76" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">线程 H  高优先级</text>
<text x="510" y="94" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">请求锁 R → 等待</text>

<line x1="510" y1="106" x2="510" y2="154" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr)"/>
<text x="518" y="132" text-anchor="start" font-size="10" fill="#16A34A">调度器提升 L 优先级</text>

<rect x="400" y="158" width="220" height="48" rx="9" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="510" y="176" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#166534">线程 L  ↑ 临时提升</text>
<text x="510" y="194" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#16A34A">获得与 H 相同的优先级</text>

<line x1="510" y1="206" x2="510" y2="254" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr)"/>
<text x="518" y="232" text-anchor="start" font-size="10" fill="#16A34A">L 快速完成，释放锁</text>

<rect x="400" y="258" width="220" height="48" rx="9" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="510" y="276" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#334155">锁 R 释放</text>
<text x="510" y="294" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#64748B">H 获得锁，立即运行</text>

<line x1="510" y1="306" x2="510" y2="330" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr)"/>

<rect x="380" y="332" width="260" height="48" rx="9" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
<text x="510" y="350" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#166534">H 按时运行</text>
<text x="510" y="368" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#16A34A">优先级反转消除，调度正确</text>

<!-- ══ CENTER DIVIDER ══ -->
<line x1="340" y1="28" x2="340" y2="452" stroke="#E2E8F0" stroke-width="1.5"/>
<rect x="316" y="214" width="48" height="28" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
<text x="340" y="228" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#94A3B8">vs</text>

</svg>
