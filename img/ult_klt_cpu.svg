<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text{font-family:system-ui,"Noto Sans SC",sans-serif}</style>
</defs>

<!--
  Three horizontal bands:
  User space   y=16..166
  Kernel space y=182..302
  Hardware     y=318..438

  Node positions:
  App          cx=200  y=52   w=140 h=44
  ULT1         cx=380  y=52   w=100 h=44
  ULT2         cx=500  y=52   w=100 h=44
  OS           cx=200  y=222  w=140 h=44
  KLT          cx=440  y=222  w=140 h=44
  CPU          cx=440  y=358  w=140 h=44
-->

<!-- ══ BAND 1: 用户态 ══ -->
<rect x="16" y="16" width="648" height="150" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" stroke-dasharray="6 3"/>
<text x="32" y="36" font-size="10" font-weight="700" letter-spacing=".08em" fill="#0284C7">用户态  USER SPACE  ( ULT )</text>

<!-- App -->
<rect x="130" y="52" width="140" height="44" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="200" y="70" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">应用程序运行时</text>
<text x="200" y="86" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">App Runtime</text>

<!-- ULT1 -->
<rect x="330" y="52" width="100" height="44" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="380" y="70" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">ULT 1</text>
<text x="380" y="86" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">用户线程</text>

<!-- ULT2 -->
<rect x="450" y="52" width="100" height="44" rx="9" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="500" y="70" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0369A1">ULT 2</text>
<text x="500" y="86" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0284C7">用户线程</text>

<!-- App → ULT1 -->
<line x1="270" y1="74" x2="328" y2="74" stroke="#0284C7" stroke-width="1.8" marker-end="url(#arr)"/>
<text x="299" y="67" text-anchor="middle" font-size="9" fill="#0284C7">库调度</text>

<!-- App → ULT2 (L-bend) -->
<path d="M270 84 L299 84 L299 96 L448 96" fill="none" stroke="#0284C7" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ULT row label -->
<text x="200" y="126" text-anchor="middle" font-size="10" fill="#0369A1">调度由用户态线程库管理，内核不感知</text>

<!-- ══ BAND 2: 内核态 ══ -->
<rect x="16" y="182" width="648" height="120" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1" stroke-dasharray="6 3"/>
<text x="32" y="202" font-size="10" font-weight="700" letter-spacing=".08em" fill="#D97706">内核态  KERNEL SPACE  ( KLT )</text>

<!-- OS Scheduler -->
<rect x="130" y="218" width="140" height="44" rx="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="200" y="236" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#B45309">OS 调度器</text>
<text x="200" y="252" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#D97706">Kernel Scheduler</text>

<!-- KLT -->
<rect x="370" y="218" width="140" height="44" rx="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="440" y="236" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#B45309">KLT</text>
<text x="440" y="252" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#D97706">内核线程 ( 对应进程 ) </text>

<!-- OS → KLT -->
<line x1="270" y1="240" x2="368" y2="240" stroke="#D97706" stroke-width="1.8" marker-end="url(#arr)"/>
<text x="319" y="233" text-anchor="middle" font-size="9" fill="#D97706">系统调度</text>

<!-- ══ ULT → KLT multiplexing (cross-band dashed) ══ -->
<!-- ULT1 → KLT -->
<path d="M380 96 L380 166 L440 166 L440 216" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text x="420" y="160" text-anchor="middle" font-size="9" fill="#64748B">复用</text>

<!-- ULT2 → KLT -->
<path d="M500 96 L500 166 L460 166 L460 216" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>

<!-- ══ BAND 3: 硬件 ══ -->
<rect x="16" y="318" width="648" height="120" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1" stroke-dasharray="6 3"/>
<text x="32" y="338" font-size="10" font-weight="700" letter-spacing=".08em" fill="#7C3AED">硬件  HARDWARE</text>

<!-- CPU -->
<rect x="370" y="354" width="140" height="44" rx="9" fill="#EDE9FE" stroke="#9333EA" stroke-width="1.5"/>
<text x="440" y="372" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#7E22CE">CPU</text>
<text x="440" y="388" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#9333EA">处理器</text>

<!-- KLT → CPU -->
<line x1="440" y1="262" x2="440" y2="352" stroke="#9333EA" stroke-width="2" marker-end="url(#arr)"/>
<text x="452" y="310" text-anchor="start" font-size="9" fill="#9333EA">执行</text>

<!-- ══ BAND LABELS right side ══ -->
<rect x="620" y="26"  width="36" height="130" rx="6" fill="#E0F2FE" stroke="#93C5FD" stroke-width="1"/>
<text x="638" y="91"  text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#0369A1" transform="rotate(-90 638 91)">用户态</text>

<rect x="620" y="192" width="36" height="100" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
<text x="638" y="242" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#B45309" transform="rotate(-90 638 242)">内核态</text>

<rect x="620" y="328" width="36" height="100" rx="6" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
<text x="638" y="378" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#7C3AED" transform="rotate(-90 638 378)">硬件</text>

</svg>
